name: Reusable stale bot

on:
  workflow_call:
    inputs:
      days-before-stale:
        description: "Days of inactivity before marking stale"
        type: number
        default: 60
      days-before-close:
        description: "Days after being marked stale before closing"
        type: number
        default: 14
      exempt-labels:
        description: "Comma-separated labels that exempt an issue/PR from staleness"
        type: string
        default: "pinned,security,status: in-progress"

jobs:
  stale:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/stale@v10
        with:
          days-before-stale: ${{ inputs.days-before-stale }}
          days-before-close: ${{ inputs.days-before-close }}
          exempt-issue-labels: ${{ inputs.exempt-labels }}
          exempt-pr-labels: ${{ inputs.exempt-labels }}
          stale-issue-label: "stale"
          stale-pr-label: "stale"
          stale-issue-message: >
            This issue has been automatically marked as stale because it has
            had no activity for ${{ inputs.days-before-stale }} days. It will
            be closed in ${{ inputs.days-before-close }} days if no further
            activity occurs.
          stale-pr-message: >
            This pull request has been automatically marked as stale because
            it has had no activity for ${{ inputs.days-before-stale }} days.
            It will be closed in ${{ inputs.days-before-close }} days if no
            further activity occurs.
          close-issue-message: "Closing due to inactivity."
          close-pr-message: "Closing due to inactivity."
