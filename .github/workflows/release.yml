name: Reusable release

on:
  workflow_call:
    inputs:
      artifacts:
        description: "Glob of build artifacts to attach to the release (optional)"
        type: string
        default: ""
      draft:
        description: "Create the release as a draft"
        type: boolean
        default: false
      prerelease:
        description: "Mark the release as a prerelease"
        type: boolean
        default: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          draft: ${{ inputs.draft }}
          prerelease: ${{ inputs.prerelease }}
          files: ${{ inputs.artifacts }}
