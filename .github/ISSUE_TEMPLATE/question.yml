name: Question or documentation
description: Ask a question or report a documentation problem
labels: ["question", "status: needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reaching out. This project follows an issues-only
        contribution model — please don't open a pull request for this;
        the maintainer will follow up or update the docs directly.
  - type: textarea
    id: question
    attributes:
      label: What's your question, or what's wrong with the docs?
      description: Be as specific as possible.
    validations:
      required: true
  - type: input
    id: location
    attributes:
      label: Related doc or page (if applicable)
      description: Link or path to the file/page this is about.
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
    validations:
      required: false
