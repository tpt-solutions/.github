name: Feature request
description: Suggest an idea or improvement
labels: ["enhancement", "status: needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. This project follows an issues-only
        contribution model — please don't open a pull request for this;
        the maintainer will implement accepted requests directly.
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: What are you trying to do that isn't currently possible or is awkward?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to happen?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
    validations:
      required: false
