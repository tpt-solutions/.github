# Canonical label set for all tpt-solutions repositories.
# Synced into individual repos via .github/workflows/label-sync.yml

- name: "bug"
  color: "d73a4a"
  description: "Something isn't working"
- name: "enhancement"
  color: "a2eeef"
  description: "New feature or request"
- name: "question"
  color: "d876e3"
  description: "Further information is requested"
- name: "documentation"
  color: "0075ca"
  description: "Improvements or additions to documentation"

- name: "priority: low"
  color: "c5def5"
  description: "Low priority"
- name: "priority: medium"
  color: "fbca04"
  description: "Medium priority"
- name: "priority: high"
  color: "e99695"
  description: "High priority"

- name: "status: needs-triage"
  color: "ededed"
  description: "Not yet reviewed by a maintainer"
- name: "status: in-progress"
  color: "0e8a16"
  description: "Actively being worked on"
- name: "status: blocked"
  color: "b60205"
  description: "Blocked on something external"

- name: "good first issue"
  color: "7057ff"
  description: "Good for newcomers"
- name: "pinned"
  color: "006b75"
  description: "Exempt from the stale bot"
- name: "stale"
  color: "eeeeee"
  description: "No activity for an extended period"
- name: "wontfix"
  color: "ffffff"
  description: "This will not be worked on"
- name: "duplicate"
  color: "cfd3d7"
  description: "This issue or pull request already exists"
